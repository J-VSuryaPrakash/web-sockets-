<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Million Checkboxes</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #071018;
        --bg-2: #0c1824;
        --panel-border: rgba(173, 196, 224, 0.18);
        --text: #eef5ff;
        --muted: #9fb2c9;
        --accent: #7dd3fc;
        --accent-2: #a78bfa;
        --shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        font-family:
          Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(125, 211, 252, 0.18),
            transparent 34%
          ),
          radial-gradient(
            circle at 85% 15%,
            rgba(167, 139, 250, 0.16),
            transparent 28%
          ),
          linear-gradient(160deg, var(--bg), var(--bg-2) 62%, #04080d 100%);
        color: var(--text);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.85),
          transparent 92%
        );
      }

      .container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: min(1120px, 100%);
        min-height: calc(100vh - 48px);
        margin: 0 auto;
        padding: 28px 22px 34px;
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        background: linear-gradient(
          180deg,
          rgba(12, 22, 33, 0.9),
          rgba(8, 15, 24, 0.74)
        );
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        overflow: hidden;
      }

      .head {
        width: 100%;
        text-align: center;
        padding: 6px 0 2px;
      }

      .head h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.75rem);
        line-height: 1;
        letter-spacing: -0.06em;
        font-weight: 800;
        background: linear-gradient(
          135deg,
          #ffffff 0%,
          var(--accent) 55%,
          var(--accent-2) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 28px rgba(125, 211, 252, 0.12);
      }

      .head::after {
        content: "Click a box to sync its state live.";
        display: block;
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.95rem;
        letter-spacing: 0.02em;
      }

      .boxes {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(24px, 1fr));
        gap: 12px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        background: rgba(3, 9, 15, 0.4);
      }

      .boxes input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        margin: 0;
        border-radius: 7px;
        border: 1.5px solid rgba(173, 196, 224, 0.5);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.06),
          rgba(255, 255, 255, 0.02)
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 6px 16px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        transition:
          transform 140ms ease,
          border-color 140ms ease,
          background 140ms ease,
          box-shadow 140ms ease;
      }

      .boxes input[type="checkbox"]:hover {
        transform: translateY(-1px) scale(1.04);
        border-color: rgba(125, 211, 252, 0.8);
      }

      .boxes input[type="checkbox"]:focus-visible {
        outline: none;
        box-shadow:
          0 0 0 3px rgba(125, 211, 252, 0.22),
          0 6px 16px rgba(0, 0, 0, 0.2);
      }

      .boxes input[type="checkbox"]:checked {
        border-color: rgba(125, 211, 252, 0.95);
        background:
          radial-gradient(
            circle at 30% 30%,
            rgba(255, 255, 255, 0.75),
            transparent 34%
          ),
          linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow:
          0 0 0 1px rgba(125, 211, 252, 0.22),
          0 10px 22px rgba(125, 211, 252, 0.18);
      }

      .boxes input[type="checkbox"]:checked::after {
        content: "";
        position: relative;
        display: block;
        width: 8px;
        height: 4px;
        margin: 5px 0 0 4px;
        border-left: 2px solid rgba(255, 255, 255, 0.98);
        border-bottom: 2px solid rgba(255, 255, 255, 0.98);
        transform: rotate(-45deg);
      }

      @media (max-width: 640px) {
        body {
          padding: 14px;
        }

        .container {
          min-height: calc(100vh - 28px);
          padding: 20px 14px 22px;
          border-radius: 20px;
        }

        .boxes {
          grid-template-columns: repeat(auto-fill, minmax(20px, 1fr));
          gap: 10px;
          padding: 14px;
        }

        .boxes input[type="checkbox"] {
          width: 20px;
          height: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="head">
        <h1>Million Checkboxes</h1>
      </div>
      <div class="boxes" id="boxes"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const CHECK_BOXES = 100;
      const boxContainer = document.getElementById("boxes");

      window.addEventListener("load", async () => {
        const response = await fetch('/checkboxes', { method: 'GET' });
        const data = await response.json();
        
        if (data && data.checkbox) {
          data.checkbox.forEach((value, index) => {
            const input = document.createElement("input");
            input.id = index;
            input.type = 'checkbox';
            input.checked = value;
            input.addEventListener("change", (e) => {
              socket.emit("client:checkbox", {
                id: e.target.id,
                checked: e.target.checked,
              });
            });
            boxContainer.appendChild(input);
          });
        }
      });

      socket.on("server:checkbox", (data) => {
        const { id, checked } = data;
        const input = document.getElementById(id);
        if (input) {
          input.checked = checked;
        }
      });
    </script>
  </body>
</html>
