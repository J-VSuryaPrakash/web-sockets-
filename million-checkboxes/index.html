<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Million Checkboxes</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: content-box;
        background-color: #101010;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        border: solid 0.2px #f0f8ff;
        margin: 20px;
        border-radius: 12px;
        height: 100vh;
      }

      .head {
        color: #f0f8ff;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
        /* border: solid 0.2px #a9fba0; */
        margin: 12px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="head">
        <h1>Million Checkboxes</h1>
      </div>
      <div class="boxes" id="boxes"></div>
    </div>
    <script>
      const ws = new WebSocket("ws://localhost:9000");
      const boxes = document.getElementById("boxes");

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: "init" }));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.id === undefined) render(data);
        if (data.type === "state") {
          const checkbox = document.getElementById(data.id);
          if (checkbox) {
            checkbox.checked = data.state;
          }
        }
      };

      function render(list) {
        for (let i = 0; i < 10; i++) {
          const input = document.createElement("input");
          input.id = i;
          input.type = "checkbox";
          if (list.findIndex((item) => item === i) !== -1) {
            input.checked = true;
          } else {
            input.checked = false;
          }
          input.onchange = () => {
            ws.send(JSON.stringify({type: 'state', id: input.id, state: input.checked}));
          };
          boxes.appendChild(input);
        }
      }
    </script>
  </body>
</html>
